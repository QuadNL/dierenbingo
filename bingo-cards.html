  <!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Kaarten Afdrukken</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
        }
        
        /* UI Controls (screen-only) */
        #controls {
            padding: 2rem;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        #controls label {
            font-weight: 600;
            color: #333;
        }
        
        #controls input {
            padding: 0.5rem 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            width: 120px;
        }
        
        #controls button {
            padding: 0.75rem 1.5rem;
            background: #ff9f43;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        
        #controls button:hover {
            background: #ff8c1a;
        }
        
        #print-area {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            padding: 1rem;
        }
        
        /* A4 Page Container - Landscape - holds 4 cards (2x2) */
        .page {
            width: 297mm;
            height: 210mm;
            background: white;
            margin: 0 auto;
            padding: 0.8cm;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0.4cm;
            page-break-after: always;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .page:last-child {
            page-break-after: avoid;
        }
        
        /* Individual Bingo Card */
        .print-card {
            border: 2px solid #333;
            background: white;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            padding: 6px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        
        .print-cell {
            border: 1px solid #555;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fdf6e3;
            overflow: hidden;
            padding: 2px;
            min-height: 30px;
        }
        
        .print-cell .emoji {
            font-size: 24px;
            line-height: 1;
            margin-bottom: 1px;
        }
        
        .print-cell span {
            font-size: 7px;
            font-weight: bold;
            color: #222;
            text-align: center;
            line-height: 1;
        }
        
        .card-number {
            position: absolute;
            top: 1px;
            right: 2px;
            font-size: 7px;
            color: #999;
            font-weight: bold;
        }
        
        .wildcard-cell {
            background: #fff3cd;
            border-color: #ffa500;
        }
        
        .wildcard-cell span {
            color: #ff6b00;
        }
        
        /* Responsive for screen view */
        @media screen and (max-width: 1200px) {
            #controls {
                padding: 1rem;
                flex-direction: column;
                align-items: flex-start;
            }
            
            .page {
                width: 100%;
                max-width: 900px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                margin: 0 auto 2rem;
                aspect-ratio: 297 / 210;
            }
        }
        
        /* Print Styles */
        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            
            #controls {
                display: none;
            }
            
            #print-area {
                gap: 0;
                padding: 0;
            }
            
            .page {
                margin: 0;
                width: 100%;
                height: 100%;
                page-break-after: always;
                box-shadow: none;
            }
            
            .page:last-child {
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="controls">
        <label for="cardCount">Aantal kaarten:</label>
        <input type="number" id="cardCount" min="4" max="100" value="4" step="4">
        <button id="generateBtn">Genereer & Print</button>
        <span id="status" style="margin-left: auto; color: #666; font-size: 0.9rem;"></span>
    </div>
    
    <div id="print-area"></div>

    <script>
        const ANIMALS = [
            { id: 'hond', name: 'Hond', icon: '🐶' },
            { id: 'kat', name: 'Kat', icon: '🐱' },
            { id: 'koe', name: 'Koe', icon: '🐮' },
            { id: 'varken', name: 'Varken', icon: '🐷' },
            { id: 'schaap', name: 'Schaap', icon: '🐑' },
            { id: 'paard', name: 'Paard', icon: '🐴' },
            { id: 'kip', name: 'Kip', icon: '🐔' },
            { id: 'eend', name: 'Eend', icon: '🦆' },
            { id: 'konijn', name: 'Konijn', icon: '🐰' },
            { id: 'muis', name: 'Muis', icon: '🐭' },
            { id: 'olifant', name: 'Olifant', icon: '🐘' },
            { id: 'leeuw', name: 'Leeuw', icon: '🦁' },
            { id: 'aap', name: 'Aap', icon: '🐒' },
            { id: 'beer', name: 'Beer', icon: '🐻' },
            { id: 'krokodil', name: 'Krokodil', icon: '🐊' },
            { id: 'slang', name: 'Slang', icon: '🐍' },
            { id: 'tijger', name: 'Tijger', icon: '🐯' },
            { id: 'zebra', name: 'Zebra', icon: '🦓' },
            { id: 'giraf', name: 'Giraf', icon: '🦒' },
            { id: 'pinguin', name: 'Pinguïn', icon: '🐧' },
        ];
        
        const wildcard = { name: 'WILDCARD', icon: '⭐', isWildcard: true };
        
        function generateCards(numCards) {
            const area = document.getElementById('print-area');
            const status = document.getElementById('status');
            
            // Validate input
            numCards = Math.max(4, Math.min(100, parseInt(numCards) || 4));
            // Round to nearest 4 for better page layout
            numCards = Math.ceil(numCards / 4) * 4;
            
            let html = '';
            let cardIndex = 0;
            
            // Generate pages with 4 cards each (2x2 grid)
            for (let pageNum = 0; cardIndex < numCards; pageNum++) {
                html += '<div class="page">';
                
                // 4 cards per page
                for (let cardInPage = 0; cardInPage < 4 && cardIndex < numCards; cardInPage++) {
                    cardIndex++;
                    
                    // Pick 11 random unique animals for this card
                    const shuffled = [...ANIMALS].sort(() => 0.5 - Math.random());
                    const cardAnimals = shuffled.slice(0, 11);
                    
                    html += `<div class="print-card">`;
                    html += `<div class="card-number">${cardIndex}</div>`;
                    
                    // Add wildcard as first cell
                    html += `<div class="print-cell wildcard-cell">
                        <span class="emoji">${wildcard.icon}</span>
                        <span>${wildcard.name}</span>
                    </div>`;
                    
                    // Add remaining 11 animals
                    cardAnimals.forEach(a => {
                        html += `<div class="print-cell">
                            <span class="emoji">${a.icon}</span>
                            <span>${a.name}</span>
                        </div>`;
                    });
                    
                    html += `</div>`;
                }
                
                html += '</div>';
            }
            
            area.innerHTML = html;
            status.textContent = `${numCards} kaarten gegenereerd (${Math.ceil(numCards / 4)} A4 pagina's)`;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const cardCountInput = document.getElementById('cardCount');
            const generateBtn = document.getElementById('generateBtn');
            
            // Generate initial cards
            generateCards(cardCountInput.value);
            
            // Generate button click
            generateBtn.addEventListener('click', () => {
                generateCards(cardCountInput.value);
                // Auto-open print dialog
                setTimeout(() => window.print(), 500);
            });
            
            // Auto-generate when input changes if not actively typing
            let timeout;
            cardCountInput.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    generateCards(cardCountInput.value);
                }, 500);
            });
            
            // Auto-print on load (optional - disabled for better UX)
            // setTimeout(() => window.print(), 1000);
        });
    </script>
</body>
</html>
